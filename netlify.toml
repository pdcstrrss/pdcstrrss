[build]
  command = "npm run build"
  functions = "dist/apps/web-remix/functions"
  edge_functions = "dist/apps/web-remix/edge-functions"
  publish = "dist/apps/web-remix/public"

[dev]
  command = "npm run watch --workspace=@pdcstrrss/web-remix"
  port = 3000
  autoLaunch = false

[functions."function-aggregate"]
schedule = "@hourly"

[[edge_functions]]
path = "/*"
function = "server"

[[redirects]]
  from = "https://pdcstrrss.netlify.app/*"
  to = "https://pdcstrrss.app/:splat"

[[redirects]]
  from = "/js/stats.js"
  to = "https://plausible.io/js/script.js"
  status = 200

[[redirects]]
  from = "/stats/event"
  to = "https://plausible.io/api/event"
  status = 200

[[redirects]]
  from = "/api/aggregate"
  to = "/.netlify/functions/function-aggregate"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/edge-functions/server"
  status = 200

[[headers]]
  for = "/build/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, s-maxage=31536000"
